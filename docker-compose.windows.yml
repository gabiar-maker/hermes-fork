#
# docker-compose.windows.yml — Windows Docker Desktop compatible
#
# Differences from docker-compose.yml:
#   - Removes `network_mode: host` (not supported on Docker Desktop for Windows)
#   - Uses explicit port mappings instead
#   - Uses Windows-style volume path for ~/.hermes
#
# Image: same as docker-compose.yml (the local fork build, tag `hermes-agent`,
# NOT the upstream `nousresearch/hermes-agent` image) — this fork adds the
# plugins/jb_outbound/ plugin, which upstream does not have. Build it first
# with `docker compose build` (uses docker-compose.yml's `build: .`) or
# `docker build -t hermes-agent .`. See plugins/jb_outbound/README.md for the
# Windows build pitfalls (CRLF checkout) before building from a native
# Windows checkout.
#
# Usage:
#   docker compose -f docker-compose.windows.yml up -d
#
services:
  gateway:
    image: hermes-agent
    container_name: hermes
    restart: unless-stopped
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      - HERMES_DASHBOARD_HOST=0.0.0.0
    ports:
      - "127.0.0.1:9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
